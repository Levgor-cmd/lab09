name: Docker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: docker build -t logger .
    
    - name: Test container
      run: |
        mkdir -p logs
        echo "test message" | docker run -i -v "$(pwd)/logs/:/home/logs/" logger
        cat logs/log.txt
