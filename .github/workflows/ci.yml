name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    - name: Configure CMake
      run: cmake -H. -B_build -DBUILD_TESTS=ON
    - name: Build
      run: cmake --build _build
    - name: Run tests
      run: cd _build && ctest
